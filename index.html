<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kwak Laboratory | Yonsei University</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#ffffff;
  --bg2:#f8f8f6;
  --text:#1a1a2e;
  --text2:#555566;
  --text3:#999aaa;
  --accent:#003087;
  --accent2:#0047c8;
  --border:#e8e8ec;
  --nav-h:68px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased;}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--nav-h);
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 2.5rem;width:100%;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;flex-direction:column;cursor:pointer;gap:2px;}
.nav-logo-main{font-size:0.9rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text);line-height:1;}
.nav-logo-sub{font-size:0.62rem;font-weight:400;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);line-height:1;}
.nav-links{display:flex;align-items:center;gap:0;}
.nl{
  font-size:0.72rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text2);cursor:pointer;padding:0.5rem 1.1rem;
  border:none;background:none;
  position:relative;transition:color 0.2s;
}
.nl::after{content:'';position:absolute;bottom:-1px;left:50%;right:50%;height:2px;background:var(--accent);transition:all 0.25s;}
.nl:hover{color:var(--accent);}
.nl:hover::after,.nl.act::after{left:1.1rem;right:1.1rem;}
.nl.act{color:var(--accent);}

/* ── SHARED ── */
.pg{padding-top:var(--nav-h);min-height:100vh;}
.wrap{max-width:1100px;margin:0 auto;padding:0 2.5rem;}
.sec{padding:6rem 0;}
.sec-alt{background:var(--bg2);}
.label{
  display:inline-block;font-size:0.65rem;font-weight:600;
  letter-spacing:0.22em;text-transform:uppercase;
  color:var(--accent);margin-bottom:1.2rem;
}
.h2{
  font-size:clamp(1.6rem,3vw,2.4rem);font-weight:300;
  letter-spacing:-0.01em;color:var(--text);
  line-height:1.2;margin-bottom:1.4rem;
}
.h2 strong{font-weight:600;}
.body-text{font-size:0.95rem;color:var(--text2);line-height:1.85;max-width:58ch;}
.divider{height:1px;background:var(--border);margin:0;}

/* ── HERO ── */
.hero{
  padding:8rem 0 7rem;
  border-bottom:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
.hero-bg-text{
  position:absolute;top:50%;right:-2rem;transform:translateY(-50%);
  font-size:clamp(8rem,15vw,16rem);font-weight:700;letter-spacing:-0.04em;
  color:rgba(0,48,135,0.04);line-height:1;pointer-events:none;white-space:nowrap;
  font-family:'Montserrat',sans-serif;
}
.hero-inner{position:relative;z-index:1;}
.hero-eyebrow{
  font-size:0.68rem;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;
  color:var(--accent);margin-bottom:2rem;
  display:flex;align-items:center;gap:1rem;
}
.hero-eyebrow::before{content:'';display:block;width:28px;height:1px;background:var(--accent);}
.hero-h1{
  font-size:clamp(2.6rem,5.5vw,4.4rem);font-weight:300;
  letter-spacing:-0.02em;line-height:1.08;
  color:var(--text);margin-bottom:0.3rem;
}
.hero-h1 em{font-style:normal;font-weight:600;color:var(--accent);}
.hero-h1-sub{
  font-size:clamp(2.6rem,5.5vw,4.4rem);font-weight:300;
  letter-spacing:-0.02em;line-height:1.08;
  color:var(--text3);margin-bottom:2.5rem;
  font-family:'EB Garamond',serif;font-style:italic;
}
.hero-desc{
  font-size:1rem;color:var(--text2);max-width:52ch;
  line-height:1.85;margin-bottom:3rem;font-weight:300;
}
.hero-ctas{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:5rem;}
.btn{
  font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  padding:0.85rem 2rem;border-radius:2px;cursor:pointer;
  transition:all 0.22s;display:inline-block;text-decoration:none;
}
.btn-fill{background:var(--accent);color:#fff;border:1px solid var(--accent);}
.btn-fill:hover{background:var(--accent2);border-color:var(--accent2);}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.btn-ghost:hover{background:var(--accent);color:#fff;}
.hero-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid var(--border);padding-top:3rem;gap:2rem;
}
.stat-n{font-size:2.2rem;font-weight:300;color:var(--text);letter-spacing:-0.02em;margin-bottom:0.2rem;}
.stat-n sup{font-size:1rem;font-weight:600;color:var(--accent);}
.stat-l{font-size:0.7rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}

/* ── RESEARCH ── */
.res-intro{max-width:640px;margin-bottom:4rem;}
.res-list{display:flex;flex-direction:column;gap:0;}
.res-item{
  display:grid;grid-template-columns:80px 1fr;gap:2rem;
  padding:2.5rem 0;border-bottom:1px solid var(--border);
  cursor:pointer;transition:all 0.2s;
  align-items:start;
}
.res-item:first-child{border-top:1px solid var(--border);}
.res-item:hover .res-title{color:var(--accent);}
.res-item:hover .res-arrow{transform:translateX(4px);color:var(--accent);}
.res-num{font-size:0.7rem;font-weight:600;color:var(--text3);letter-spacing:0.1em;padding-top:0.3rem;}
.res-body{}
.res-title{font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:0.6rem;transition:color 0.2s;line-height:1.3;}
.res-desc{font-size:0.87rem;color:var(--text2);line-height:1.8;max-width:58ch;}
.res-arrow{margin-top:1rem;font-size:0.8rem;color:var(--text3);transition:all 0.2s;display:inline-block;}

/* ── RESEARCH FULL ── */
.res-full-item{padding:3rem 0;border-bottom:1px solid var(--border);}
.res-full-item:first-child{border-top:1px solid var(--border);}
.res-full-num{font-size:0.65rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem;}
.res-full-title{font-size:1.35rem;font-weight:600;color:var(--text);margin-bottom:1.2rem;line-height:1.3;}
.res-full-text{font-size:0.93rem;color:var(--text2);line-height:1.88;max-width:72ch;}

/* ── PI ── */
.pi-layout{display:grid;grid-template-columns:260px 1fr;gap:5rem;align-items:start;}
.pi-photo{width:100%;aspect-ratio:3/4;object-fit:cover;filter:grayscale(8%);}
.pi-photo-placeholder{width:100%;aspect-ratio:3/4;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:2rem;}
.pi-name{font-size:1.7rem;font-weight:300;letter-spacing:-0.01em;color:var(--text);margin-bottom:0.3rem;}
.pi-role{font-size:0.72rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}
.pi-affil{font-size:0.88rem;color:var(--text2);margin-bottom:0.4rem;}
.pi-email a{font-size:0.88rem;color:var(--accent);text-decoration:none;}
.pi-email a:hover{text-decoration:underline;}
.pi-section{margin-top:2rem;}
.pi-section-label{font-size:0.65rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:0.8rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.pi-li{font-size:0.87rem;color:var(--text2);padding:0.5rem 0;border-bottom:1px solid var(--border);display:flex;gap:0.8rem;line-height:1.5;}
.pi-li::before{content:'—';color:var(--accent);flex-shrink:0;}

/* ── MEMBERS ── */
.msec-title{font-size:0.65rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);padding-bottom:0.8rem;border-bottom:2px solid var(--text);margin-bottom:1.5rem;margin-top:3rem;}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1.5rem;margin-bottom:1rem;}
.mcard{cursor:default;transition:all 0.25s;}
.mcard:hover .mphoto{filter:grayscale(0%);}
.mphoto{width:100%;aspect-ratio:1/1;object-fit:cover;filter:grayscale(25%);transition:filter 0.3s;display:block;}
.mpholder{width:100%;aspect-ratio:1/1;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:600;color:var(--text3);font-family:'Montserrat',sans-serif;}
.minfo{padding:0.8rem 0 0;}
.mname{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:0.15rem;}
.mdeg{font-size:0.72rem;color:var(--accent);font-weight:500;margin-bottom:0.2rem;}
.mbs{font-size:0.72rem;color:var(--text3);margin-bottom:0.3rem;}
.mint{font-size:0.72rem;color:var(--text2);line-height:1.5;}

.alumni-tbl{width:100%;border-collapse:collapse;margin-top:1.5rem;}
.alumni-tbl th{font-size:0.65rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);text-align:left;padding:0.6rem 0.8rem;border-bottom:2px solid var(--text);}
.alumni-tbl td{font-size:0.85rem;color:var(--text2);padding:0.7rem 0.8rem;border-bottom:1px solid var(--border);}
.alumni-tbl td:first-child{color:var(--text);font-weight:500;}
.alumni-tbl tr:hover td{background:var(--bg2);}

/* ── PUBS ── */
.pub-filter{display:flex;gap:0.5rem;margin-bottom:3rem;flex-wrap:wrap;}
.pub-fbtn{
  font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  padding:0.5rem 1.2rem;border:1px solid var(--border);border-radius:2px;
  cursor:pointer;transition:all 0.2s;background:none;color:var(--text2);
}
.pub-fbtn:hover,.pub-fbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.pub-group-hd{
  font-size:0.68rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text3);padding:0.6rem 0;border-bottom:1px solid var(--border);
  margin-bottom:0;border-top:2px solid var(--text);margin-top:2.5rem;
}
.pub-group-hd:first-of-type{margin-top:0;}
.pub-row{
  display:grid;grid-template-columns:40px 1fr;gap:1.2rem;
  padding:1.2rem 0;border-bottom:1px solid var(--border);
  align-items:start;
}
.pub-n{font-size:0.75rem;font-weight:600;color:var(--text3);padding-top:0.15rem;}
.pub-t{font-size:0.9rem;font-weight:500;color:var(--text);line-height:1.55;margin-bottom:0.3rem;}
.pub-a{font-size:0.78rem;color:var(--text2);line-height:1.6;margin-bottom:0.3rem;}
.pub-j{font-size:0.78rem;font-style:italic;color:var(--accent);}
.pub-meta{display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;margin-top:0.3rem;}
.pub-hl{font-size:0.63rem;font-weight:700;letter-spacing:0.08em;color:#b45309;background:#fef3c7;border:1px solid #fde68a;padding:0.15rem 0.55rem;border-radius:2px;}
.pub-doi{font-size:0.68rem;font-weight:500;color:var(--accent);text-decoration:none;opacity:0.75;}
.pub-doi:hover{opacity:1;text-decoration:underline;}

/* ── NEWS ── */
.news-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:2.5rem;margin-top:3rem;}
.ncard{cursor:pointer;transition:all 0.25s;border:1px solid var(--border);}
.ncard:hover{box-shadow:0 8px 32px rgba(0,48,135,0.08);transform:translateY(-2px);}
.nimg{width:100%;height:220px;object-fit:cover;display:block;filter:grayscale(10%);transition:filter 0.3s;}
.ncard:hover .nimg{filter:grayscale(0%);}
.nbody{padding:1.5rem;}
.ntag{font-size:0.63rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:0.6rem;display:block;}
.ntitle{font-size:1rem;font-weight:600;color:var(--text);line-height:1.45;margin-bottom:0.6rem;}
.ndate{font-size:0.75rem;color:var(--text3);}

/* ── JOIN ── */
.join-top{padding:2rem 0 4rem;max-width:700px;margin:0 auto;text-align:center;}
.pos-list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--border);}
.pos-item{display:flex;align-items:center;gap:1.5rem;padding:1.2rem 0;border-bottom:1px solid var(--border);}
.pos-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.pos-txt{font-size:0.95rem;color:var(--text2);}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:4rem;}
.ccard{background:var(--bg2);padding:2.5rem;}
.clabel{font-size:0.65rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}
.cval{font-size:0.92rem;color:var(--text2);line-height:1.9;}
.cval a{color:var(--accent);text-decoration:none;}
.cval a:hover{text-decoration:underline;}
.map-box{margin-top:2px;height:340px;overflow:hidden;}
.map-box iframe{width:100%;height:100%;border:0;display:block;filter:grayscale(20%);}

/* ── FEATURED PUB ── */
.feat-pub{background:var(--text);color:#fff;padding:3rem;margin-top:0;}
.feat-journal{font-size:0.65rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:1rem;display:block;}
.feat-title{font-size:1.15rem;font-weight:500;line-height:1.55;color:#fff;margin-bottom:0.8rem;}
.feat-auth{font-size:0.83rem;color:rgba(255,255,255,0.55);margin-bottom:1.5rem;}
.feat-auth strong{color:rgba(255,255,255,0.8);}

/* ── CONTACT STRIP ── */
.cstrip{background:var(--accent);padding:4rem 0;}
.cstrip-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:2rem;}
.cstrip h3{font-size:1.5rem;font-weight:300;color:#fff;letter-spacing:-0.01em;}
.cstrip p{font-size:0.88rem;color:rgba(255,255,255,0.65);margin-top:0.3rem;}


/* ── NEWS POST ── */
.npost-hero{width:100%;height:480px;object-fit:cover;display:block;filter:grayscale(5%);}
.npost-back{font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;margin-bottom:2.5rem;display:flex;align-items:center;gap:0.5rem;transition:color 0.2s;}
.npost-back:hover{color:var(--accent);}
.npost-tag{font-size:0.63rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;display:block;}
.npost-title{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:300;line-height:1.2;color:var(--text);margin-bottom:1rem;letter-spacing:-0.01em;}
.npost-meta{font-size:0.8rem;color:var(--text3);display:flex;align-items:center;gap:0.8rem;padding-bottom:2.5rem;border-bottom:1px solid var(--border);}
.npost-body{max-width:76ch;padding:3rem 0 2rem;}
.npost-body p{font-size:0.97rem;color:var(--text2);line-height:1.9;margin-bottom:1.6rem;}
.npost-gallery{display:grid;gap:1rem;margin:2rem 0;}
.npost-gallery.cols2{grid-template-columns:1fr 1fr;}
.npost-gallery.cols3{grid-template-columns:1fr 1fr 1fr;}
.npost-gallery img{width:100%;object-fit:cover;display:block;aspect-ratio:4/3;filter:grayscale(5%);transition:filter 0.3s;}
.npost-gallery img:hover{filter:grayscale(0%);}
.npost-gallery img.portrait{aspect-ratio:3/4;}
.npost-divider{height:1px;background:var(--border);margin:4rem 0 3rem;}
.npost-related-label{font-size:0.65rem;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:2rem;display:block;}
.npost-related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem;}
@media(max-width:700px){
  .npost-gallery.cols2,.npost-gallery.cols3{grid-template-columns:1fr;}
  .npost-hero{height:280px;}
}
/* ── FOOTER ── */
.footer{background:var(--text);padding:3rem 0;}
.footer-inner{display:flex;justify-content:space-between;align-items:start;gap:3rem;flex-wrap:wrap;}
.footer-logo-text{font-size:0.85rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#fff;margin-bottom:0.4rem;}
.footer-info{font-size:0.78rem;color:rgba(255,255,255,0.4);line-height:1.8;}
.footer-links{display:flex;flex-wrap:wrap;gap:0.2rem;}
.flink{font-size:0.72rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.4);cursor:pointer;padding:0.3rem 0.7rem;border:none;background:none;transition:color 0.2s;}
.flink:hover{color:#fff;}
.footer-copy{font-size:0.72rem;color:rgba(255,255,255,0.25);margin-top:2rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,0.08);}

/* ── ANIM ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.65s ease both;}
.fu2{animation:fadeUp 0.65s 0.12s ease both;}
.fu3{animation:fadeUp 0.65s 0.24s ease both;}
.fu4{animation:fadeUp 0.65s 0.36s ease both;}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .pi-layout{grid-template-columns:1fr;}
  .hero-stats{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:700px){
  .nav-links{display:none;}
  .nav-inner{padding:0 1.5rem;}
  .wrap{padding:0 1.5rem;}
  .hero{padding:5rem 0 4rem;}
  .sec{padding:4rem 0;}
  .contact-grid{grid-template-columns:1fr;}
  .cstrip-inner{flex-direction:column;align-items:flex-start;}
}
</style>
</head>

<div id="root"></div>

<script type="text/babel">
const {useState,useEffect}=React;

/* ─── DATA ─────────────────────────────────────────── */
const RA=[
  {n:"01",t:"Nanotechnology for Cell Signaling",

];
const PI={

  edu:["2020.9 – present  ·  Assistant Professor, Advanced Science Institute, Yonsei University","2017 – 2020  ·  Postdoctoral Fellow, UCSF (Young-wook Jun Lab)","2011 – 2016  ·  Ph.D. Biomedical Engineering, Yale University (Rong Fan Lab)","2007 – 2011  ·  B.S. Bioengineering, Rice University"],

function MCard({m}){
  const [e,sE]=useState(false);
  const ini=m.name.split(" ").map(w=>w[0]).join("").slice(0,2);
  return <div className="mcard">
    {!e?<img src={m.img} alt={m.name} className="mphoto" onError={()=>sE(true)}/>:<div className="mpholder">{ini}</div>}
    <div className="minfo">
      <div className="mname">{m.name}</div>
      {(m.deg||m.title)&&<div className="mdeg">{m.deg||m.title}</div>}
      <div className="mbs">{m.bs||m.phd||""}</div>
      <div className="mint">{m.int||""}</div>
    </div>
  </div>;
}

            <div className="res-full-num">{r.n}</div>

          </div>)}
        </div>
      </div>
    </section>
  </div>;
}

function Publications(){
  const [f,sF]=useState("all");
  return <div className="pg">
    <section className="sec">
      <div className="wrap">
        <span className="label">Research Output</span>
        <h2 className="h2">Publications</h2>
        <p className="body-text" style={{marginBottom:"2.5rem"}}>* denotes corresponding author · # denotes co-first author</p>
        <div className="pub-filter">
          {["all","yonsei","ucsf","yale"].map(k=><button key={k} className={"pub-fbtn"+(f===k?" on":"")} onClick={()=>sF(k)}>
            {k==="all"?"All":k==="yonsei"?"Yonsei (2021–)":k==="ucsf"?"UCSF (2017–20)":"Yale (2011–16)"}
          </button>)}
        </div>
        {["yonsei","ucsf","yale"].filter(k=>f==="all"||f===k).map(key=><div key={key}>
          <div className="pub-group-hd">{PB[key].label}</div>
          {PB[key].papers.map(p=><div key={p.n} className="pub-row">
            <div className="pub-n">{p.n}.</div>
            <div>
              <div className="pub-t">{p.t}</div>
              <div className="pub-a">{p.a}</div>
              <div className="pub-meta">
                <span className="pub-j">{p.j} ({p.y})</span>
                {p.hl&&<span className="pub-hl">★ High Impact</span>}
                <a href={"https://doi.org/"+p.doi} target="_blank" className="pub-doi">DOI →</a>

            <a href="mailto:minsuk.kwak@yonsei.ac.kr" style={{color:"var(--accent)",textDecoration:"none"}}>minsuk.kwak@yonsei.ac.kr</a>

              <div>Email · <a href="mailto:minsuk.kwak@yonsei.ac.kr">minsuk.kwak@yonsei.ac.kr</a></div>

function NewsPost({post,go,allPosts,postIdx}){
  const related=allPosts.filter((_,i)=>i!==postIdx).slice(0,2);
  const photos=post.photos||[];
  const allPhotos=[post.img,...photos];
  const cols=allPhotos.length>=4?"cols2":allPhotos.length===3?"cols3":allPhotos.length===2?"cols2":"cols1";
  return <div className="pg">
    <section className="sec" style={{paddingTop:"5rem"}}>
      <div className="wrap">
        <button className="npost-back" onClick={()=>go("news")}>← Back to News</button>
        <span className="npost-tag">{post.tag}</span>
        <h1 className="npost-title">{post.title}</h1>
        <div className="npost-meta">
          <span>📅 {post.date}</span>
          <span>· Kwak Laboratory, Yonsei University</span>
        </div>
        {/* 사진 갤러리 — 메인 이미지 포함 전체 */}
        <div className={"npost-gallery "+cols} style={{marginTop:"2rem"}}>
          {allPhotos.map((src,i)=><img key={i} src={src} alt={"photo "+(i+1)}/>)}
        </div>
        {/* 관련 게시물 */}
        {related.length>0&&<>
          <div className="npost-divider"/>
          <span className="npost-related-label">More from the Lab</span>
          <div className="npost-related-grid">
            {related.map((n,i)=>{
              const idx=allPosts.findIndex(x=>x.title===n.title);
              return <div key={i} className="ncard" onClick={()=>go("newspost",idx)}>
                <img src={n.img} alt={n.title} className="nimg"/>
                <div className="nbody">
                  <span className="ntag">{n.tag}</span>
                  <div className="ntitle">{n.title}</div>
                  <div className="ndate">{n.date}</div>
                </div>
              </div>;
            })}
          </div>
        </>}
      </div>
    </section>
  </div>;
}

/* ─── APP ──────── */
function App(){
  const [pg,sPg]=useState("home");
  const [postIdx,sPostIdx]=useState(0);
  const go=(p,idx)=>{
    sPg(p);
    if(idx!==undefined)sPostIdx(idx);
    window.scrollTo({top:0,behavior:"smooth"});
  };
  if(pg==="newspost"){
    return <>
      <Nav pg="news" go={go}/>
      <NewsPost post={NW[postIdx]} go={go} allPosts={NW} postIdx={postIdx}/>
      <Footer go={go}/>
    </>;
  }
  const P={home:Home,research:Research,members:Members,publications:Publications,news:News,join:Join}[pg]||Home;
  return <>
    <Nav pg={pg} go={go}/>
    <P go={go}/>
    <Footer go={go}/>
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
